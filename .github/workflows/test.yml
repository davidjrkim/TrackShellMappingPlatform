name: test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Dummy values so Next.js build + Prisma generate don't fail in CI.
      # Real secrets live in Vercel / GitHub Secrets for deploy.yml.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trackshell
      NEXTAUTH_SECRET: ci-dummy-secret-not-used-at-runtime
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_MAPBOX_TOKEN: pk.ci-dummy
      REDIS_URL: redis://localhost:6379
      PIPELINE_API_URL: http://localhost:9999
      PIPELINE_API_KEY: ci-dummy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (also runs TypeScript type checks)
        run: npm run build

      - name: Test
        run: npm test -- --ci --passWithNoTests
