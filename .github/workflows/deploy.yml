name: deploy

on:
  push:
    branches: [master]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Applies migrations to the production DB targeted by DATABASE_URL.
      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build with Vercel
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $URL"

      - name: Smoke test /api/health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          ok=""
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$URL/api/health" || echo "000")
            echo "health probe $i: $code"
            if [ "$code" = "200" ]; then ok=1; break; fi
            sleep 5
          done
          if [ -z "$ok" ]; then
            echo "Health check failed after 5 attempts"
            exit 1
          fi

      - name: Smoke test /dashboard/courses unauth redirect
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          code=$(curl -s -o /dev/null -w '%{http_code}' "$URL/dashboard/courses" || echo "000")
          echo "dashboard unauth probe: $code"
          if [ "$code" != "307" ] && [ "$code" != "302" ]; then
            echo "Expected 307 or 302 redirect to /login, got $code"
            exit 1
          fi
