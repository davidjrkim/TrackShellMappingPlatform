name: deploy

on:
  push:
    branches: [main, dev]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Applies migrations to the environment targeted by DATABASE_URL.
      # The `main` branch secret must point at the production DB;
      # the `dev` branch secret must point at staging.
      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          else
            vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
          fi

      - name: Build with Vercel
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            vercel build --prod --token=$VERCEL_TOKEN
          else
            vercel build --token=$VERCEL_TOKEN
          fi

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          else
            URL=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN)
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $URL"

      - name: Smoke test /api/health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$URL/api/health" || echo "000")
            echo "health probe $i: $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "Health check failed after 5 attempts"
          exit 1
